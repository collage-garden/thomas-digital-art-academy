name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check for broken links (internal)
        run: |
          # Basic check: ensure build succeeded and index.html exists
          test -f dist/index.html && echo "✅ Build successful" || (echo "❌ Build failed" && exit 1)
